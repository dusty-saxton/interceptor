on:
  push:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: pacman -Syyu --noconfirm base-devel arm-none-eabi-gcc arm-none-eabi-newlib git python-pip python-crcmod

      - name: Checkout
        uses: actions/checkout@v3

      - name: safe.directory
        run: git config --global --add safe.directory /__w/Interceptor/Interceptor

      - name: Make
        run: make

      - name: size
        run: arm-none-eabi-size firmware

      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware*.bin
